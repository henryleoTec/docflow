<!DOCTYPE html>
<html>
<head>
  <title>{% block title %}DocFlow{% endblock %}</title>
</head>
<body>

 <nav>
  <a href="{% url 'document-list' %}">My Documents</a>

  {% if request.user.is_authenticated %}
    | <a href="{% url 'dashboard' %}">Dashboard</a>
    | Welcome, {{ request.user.username }}
    | <a href="{% url 'document-create' %}">Upload</a>
    | <a href="{% url 'logout' %}">Logout</a>
  {% else %}
    | <a href="{% url 'login' %}">Login</a>
    | <a href="{% url 'register' %}">Register</a>
  {% endif %}
</nav>

  <hr>

  {% if messages %}
    {% for message in messages %}
      <div style="padding:10px; margin:10px 0; border-radius:4px;
        background:{% if message.tags == 'success' %}#d4edda{% elif message.tags == 'error' %}#f8d7da{% else %}#d1ecf1{% endif %};">
        {{ message }}
      </div>
    {% endfor %}
  {% endif %}

  {% block content %}
  {% endblock %}

</body>
</html>
