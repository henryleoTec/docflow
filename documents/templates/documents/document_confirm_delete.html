{% extends "documents/base.html" %}

{% block title %}Delete Document - DocFlow{% endblock %}

{% block content %}
  <h1>Delete "{{ document.title }}"?</h1>
  <p>This cannot be undone.</p>
  <form method="post">
    {% csrf_token %}
    <button type="submit">Yes, Delete</button>
    <a href="{% url 'document-list' %}">Cancel</a>
  </form>
{% endblock %}
