{% extends "documents/base.html" %}

{% block title %}Register - DocFlow{% endblock %}

{% block content %}
  <h1>Create Your Account</h1>
  <form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Register</button>
  </form>
  <p>Already have an account? <a href="{% url 'login' %}">Log in</a></p>
{% endblock %}
